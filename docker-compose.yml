version: '3.9'

services:
  nexuschat:
    build: .
    container_name: nexuschat
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      SUPERADMIN_USERNAME: ${SUPERADMIN_USERNAME:-admin}
      SUPERADMIN_PASSWORD: ${SUPERADMIN_PASSWORD:-Admin@12345}
      CORS_ORIGIN: ${CORS_ORIGIN:-*}
    volumes:
      - nexuschat-data:/app/data

volumes:
  nexuschat-data:
    driver: local
